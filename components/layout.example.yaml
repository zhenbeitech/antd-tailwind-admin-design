# Layout 组件使用指南

布局组件是基于 Ant Design 的基础布局组件，提供了企业级管理后台的标准布局结构。

## 组件列表

### PageContainer - 页面容器

页面最外层容器，提供全屏高度和基础背景。

**Props:**
- `children` - 子组件
- `className` - 自定义样式类
- `style` - 内联样式

**正确用法:**
```tsx
import { PageContainer } from 'antd-tailwind-admin-design';

function MyPage() {
  return (
    <PageContainer>
      {/* 页面内容 */}
    </PageContainer>
  );
}
```

### ContentSurface - 内容表面

主要内容的容器，带边框、阴影和圆角。

**Props:**
- `children` - 子组件
- `className` - 自定义样式类
- `style` - 内联样式
- `padding` - 内边距（默认 p-6）

**正确用法:**
```tsx
import { ContentSurface } from 'antd-tailwind-admin-design';

function MyPage() {
  return (
    <PageContainer>
      <ContentSurface>
        <h1>页面标题</h1>
        {/* 页面内容 */}
      </ContentSurface>
    </PageContainer>
  );
}
```

### Content - 内容区域

纯内容容器，不带边框和阴影。

**Props:**
- `children` - 子组件
- `className` - 自定义样式类
- `style` - 内联样式

**正确用法:**
```tsx
import { Content } from 'antd-tailwind-admin-design';

function MyPage() {
  return (
    <ContentSurface>
      <Content>
        {/* 纯内容 */}
      </Content>
    </ContentSurface>
  );
}
```

### Breadcrumb - 面包屑导航

显示当前页面的导航路径。

**Props:**
- `items` - 面包屑项数组
  - `title` - 标题
  - `href` - 链接地址（可选）

**正确用法:**
```tsx
import { Breadcrumb } from 'antd-tailwind-admin-design';

function MyPage() {
  return (
    <PageContainer>
      <Breadcrumb
        items={[
          { title: '首页', href: '/' },
          { title: '用户管理', href: '/users' },
          { title: '用户列表' },
        ]}
      />
      {/* 页面内容 */}
    </PageContainer>
  );
}
```

### App - 应用入口

包裹整个应用，提供主题配置。

**正确用法:**
```tsx
import { App } from 'antd-tailwind-admin-design';

function RootApp() {
  return (
    <App>
      {/* 你的应用内容 */}
    </App>
  );
}
```

## 布局架构

标准的三层布局结构：

```
PageContainer (页面容器)
├── Breadcrumb (面包屑导航) - 可选
├── ContentSurface (内容表面)
│   ├── Toolbar (工具栏) - 可选
│   └── Content (内容区域)
└── Footer (页脚) - 可选
```

## 完整示例

```tsx
import React from 'react';
import {
  PageContainer,
  ContentSurface,
  Content,
  Breadcrumb,
  Button,
  Input,
  Table
} from 'antd-tailwind-admin-design';

function UserListPage() {
  const columns = [
    { title: '姓名', dataIndex: 'name' },
    { title: '邮箱', dataIndex: 'email' },
  ];

  const data = [
    { key: '1', name: '张三', email: 'zhangsan@example.com' },
    { key: '2', name: '李四', email: 'lisi@example.com' },
  ];

  return (
    <PageContainer>
      {/* 面包屑导航 */}
      <Breadcrumb
        items={[
          { title: '首页', href: '/' },
          { title: '用户管理', href: '/users' },
          { title: '用户列表' },
        ]}
      />

      <ContentSurface>
        {/* 工具栏 */}
        <div className="mb-4 flex justify-between items-center">
          <h1 className="text-2xl font-bold">用户列表</h1>
          <Button type="primary">新增用户</Button>
        </div>

        {/* 搜索栏 */}
        <div className="mb-4">
          <Input placeholder="搜索用户..." className="max-w-sm" />
        </div>

        {/* 表格 */}
        <Content>
          <Table
            columns={columns}
            dataSource={data}
            rowKey="key"
          />
        </Content>
      </ContentSurface>
    </PageContainer>
  );
}
```

## 常见错误

### ❌ 错误：直接使用 div 布局

```tsx
// ❌ 不要手动实现布局结构
<div className="min-h-screen bg-white">
  <div className="container mx-auto p-6">
    <div className="bg-gray-50 rounded-lg p-6">
      {/* 内容 */}
    </div>
  </div>
</div>
```

### ✅ 正确：使用布局组件

```tsx
// ✅ 使用预定义的布局组件
<PageContainer>
  <ContentSurface>
    <Content>
      {/* 内容 */}
    </Content>
  </ContentSurface>
</PageContainer>
```

### ❌ 错误：硬编码样式值

```tsx
// ❌ 不要硬编码颜色值
<div style={{ backgroundColor: '#ffffff', borderRadius: '6px' }}>
  {/* 内容 */}
</div>
```

### ✅ 正确：使用语义化类名

```tsx
// ✅ 使用语义化类名
<div className="bg-background border border-border rounded-lg">
  {/* 内容 */}
</div>
```

## 主题定制

可以通过 App 组件的 theme 属性自定义主题：

```tsx
<App
  theme={{
    algorithm: theme.darkAlgorithm, // 使用暗色模式
    token: {
      borderRadius: 8, // 调整圆角
      colorPrimary: '#00b96b', // 修改主色
    },
  }}
>
  {/* 应用内容 */}
</App>
```

## 响应式设计

布局组件已经内置响应式支持，在移动端会自动适配：

- ContentSurface 的 padding 会根据屏幕大小调整
- 面包屑导航在小屏幕上会自动换行
- 工具栏会自动调整排列方式

## 最佳实践

1. **始终使用 PageContainer 作为最外层**
2. **重要内容放在 ContentSurface 中**
3. **面包屑放在 PageContainer 内部**
4. **避免嵌套过深**
5. **使用语义化类名而非具体值**